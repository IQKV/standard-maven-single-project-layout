services:
  # Servicename - Local Development
  servicename:
    build:
      context: .
      dockerfile: ./Dockerfile
      target: builder
    image: iqscaffold/servicename:dev
    container_name: servicename-dev
    environment:
      SPRING_PROFILES_ACTIVE: local
      SPRING_APPLICATION_NAME: servicename
    ports:
      - "8080:8080"
      - "8081:8081"
    networks:
      - servicename-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health/readiness"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    restart: unless-stopped
    volumes:
      - servicename_logs:/app/logs
      - servicename_tmp:/app/tmp
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 768M
        reservations:
          cpus: "0.25"
          memory: 384M

  # SonarQube for code quality analysis
  sonar:
    image: sonarqube:25.3.0.104237-community
    container_name: servicename-sonarqube-dev
    environment:
      - SONAR_FORCEAUTHENTICATION=false
    ports:
      - "127.0.0.1:9001:9000"
      - "127.0.0.1:9000:9000"
    networks:
      - servicename-network
    restart: unless-stopped

  # Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:latest
    container_name: servicename-prometheus-dev
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - servicename-network
    restart: unless-stopped

  # Grafana for metrics visualization
  grafana:
    image: grafana/grafana:latest
    container_name: servicename-grafana-dev
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - servicename-network
    restart: unless-stopped

networks:
  servicename-network:
    driver: bridge
    name: servicename-network-dev
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  servicename_logs:
    name: servicename_logs_dev
    driver: local
  servicename_tmp:
    name: servicename_tmp_dev
    driver: local
