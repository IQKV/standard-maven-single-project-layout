services:
  # Servicename - Full platform run including build phase
  servicename:
    extends:
      file: compose.base.yaml
      service: servicename

  # SonarQube for code quality analysis
  sonar:
    extends:
      file: compose.base.yaml
      service: sonar

  # Prometheus for metrics collection
  prometheus:
    extends:
      file: compose.base.yaml
      service: prometheus

  # Grafana for metrics visualization
  grafana:
    extends:
      file: compose.base.yaml
      service: grafana

networks:
  servicename-network:
    name: servicename-network-dev
    external: false

volumes:
  servicename_logs:
    name: servicename_logs_dev
  servicename_tmp:
    name: servicename_tmp_dev
